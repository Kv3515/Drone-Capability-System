services:
  - type: web
    name: drone-capability-system
    env: python
    plan: free
    pythonVersion: 3.9
    
    buildCommand: pip install -r requirements.txt
    
    startCommand: python run.py
    
    envVars:
      - key: PORT
        value: 10000
      - key: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
        value: "false"
      - key: STREAMLIT_SERVER_HEADLESS
        value: "true"
